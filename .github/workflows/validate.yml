name: validate

# The validator is the gate (see AGENTS.md / CLAUDE.md). Run it, the runtime
# SQLite export, and the regression fixtures on every push and pull request so
# malformed ontology data cannot merge.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Both scripts are Python that shell out to `ruby -e` for YAML parsing,
      # so the runner needs Python 3 and Ruby on PATH. No pip/gem deps.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate ontology YAML
        run: python3 scripts/validate_ontology.py

      - name: Export runtime SQLite projection
        run: python3 scripts/export_sqlite.py --output build/client-ontologies.sqlite

      - name: Run invalid-fixture regression tests
        run: python3 tests/run_fixtures.py

      - name: Run predicate-vocabulary sync tests
        run: python3 tests/run_predicates.py

      - name: Run valid-fixture validate + export tests
        run: python3 tests/run_export.py

      # Outcome-oriented: build a throwaway SQLite export and prove each client
      # ontology still answers its business/governance competency questions
      # (and that a controlled semantic drift isolates to one question). Runs
      # after validate/export so structural failures surface first.
      - name: Run competency-question suite
        run: python3 tests/run_competency.py

      - name: Run machine-check rule engine tests
        run: python3 tests/run_checks.py

      # Read-only runtime surface (issue #19): CLI acceptance, YAML/SQLite backend
      # parity, projection isolation, and competency-corpus reuse. Stdlib only.
      - name: Run runtime CLI/service tests
        run: python3 tests/run_cli.py

      - name: Run evidence-health checker tests
        run: python3 tests/run_evidence.py

      # Advisory: re-hash cited evidence spans. External absolute paths (owner
      # machines) are not available on the CI runner and report
      # `unresolvable_in_environment`, which --strict treats as advisory and never
      # blocks. Only genuine repo-relative drift/missing/invalid/unsupported anchors
      # fail this step. See scripts/check_evidence.py for the exit contract.
      - name: Evidence health (advisory for non-resolvable paths)
        run: python3 scripts/check_evidence.py --strict

  # Independent lane (issue #40): prove the PACKAGED read-only runtime installs
  # and works at the declared `requires-python = ">=3.10"` floor through its real
  # installed console entry points — not source-tree substitutes. It builds the
  # package into a clean, dependency-free virtualenv, exercises the `ontology` and
  # `ontology-mcp` scripts, and drives the documented Ruby-free consumer contract
  # (a pinned SQLite snapshot enforced from a foreign cwd with no `ruby` on PATH).
  installed-runtime:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin the DECLARED floor (3.10) so the packaged runtime and its Python-floor
      # TOML fallback stay continuously covered, independent of the 3.12 job above.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # Ruby is needed only to BUILD the SQLite snapshot (export shells to `ruby`).
      # The installed consumer smoke then runs Ruby-free by restricting PATH.
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      # Clean virtualenv install straight from the checkout, with NO runtime
      # dependencies (the core + CLI are stdlib-only). A build/entry-point
      # regression fails here, before any runtime assertion.
      - name: Install package into a clean virtualenv (no runtime deps)
        run: |
          set -euo pipefail
          python3 -m venv "$RUNNER_TEMP/venv"
          "$RUNNER_TEMP/venv/bin/python" -m pip install --upgrade pip
          "$RUNNER_TEMP/venv/bin/python" -m pip install .
          echo "installed distribution has no runtime deps:"
          "$RUNNER_TEMP/venv/bin/python" -m pip show client-ontologies | grep -E '^(Name|Version|Requires):'

      - name: Confirm installed console entry points resolve
        run: |
          set -euo pipefail
          test -x "$RUNNER_TEMP/venv/bin/ontology"
          test -x "$RUNNER_TEMP/venv/bin/ontology-mcp"
          echo "ontology + ontology-mcp resolve from the installation"

      # Build a genuine SQLite snapshot WHILE Ruby is still on PATH; the smoke
      # helper reads it Ruby-free afterward. Written under RUNNER_TEMP, never the
      # repo (nothing to commit).
      - name: Build a temporary SQLite snapshot (Ruby available)
        run: python3 scripts/export_sqlite.py --root . --output "$RUNNER_TEMP/ontology.sqlite"

      # Ruby-free installed-consumer contract: from a foreign temp cwd with a PATH
      # restricted to the venv scripts dir (no `ruby`), the installed `ontology`
      # sqlite check-copy must flag the JMD blocking rule, exit 1, and stamp
      # read_mode=sqlite / repo_commit=null; `ontology-mcp` must fail closed
      # (structured exit 2). See tests/installed_smoke.py for the exact assertions.
      - name: Installed-console runtime smoke (Ruby-free SQLite enforcement)
        run: python3 tests/installed_smoke.py --bindir "$RUNNER_TEMP/venv/bin" --sqlite-path "$RUNNER_TEMP/ontology.sqlite"

      # Run the full 27-check runtime regression suite on the 3.10 floor so the
      # declared-floor TOML fallback and every runtime contract stay covered.
      - name: Run runtime CLI/service tests under Python 3.10
        run: python3 tests/run_cli.py
