name: validate

# The validator is the gate (see AGENTS.md / CLAUDE.md). Run it, the runtime
# SQLite export, and the regression fixtures on every push and pull request so
# malformed ontology data cannot merge.
on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Both scripts are Python that shell out to `ruby -e` for YAML parsing,
      # so the runner needs Python 3 and Ruby on PATH. No pip/gem deps.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate ontology YAML
        run: python3 scripts/validate_ontology.py

      - name: Export runtime SQLite projection
        run: python3 scripts/export_sqlite.py --output build/client-ontologies.sqlite

      - name: Run invalid-fixture regression tests
        run: python3 tests/run_fixtures.py

      - name: Run predicate-vocabulary sync tests
        run: python3 tests/run_predicates.py

      - name: Run valid-fixture validate + export tests
        run: python3 tests/run_export.py

      - name: Run machine-check rule engine tests
        run: python3 tests/run_checks.py

      - name: Run evidence-health checker tests
        run: python3 tests/run_evidence.py

      # Advisory: re-hash cited evidence spans. External absolute paths (owner
      # machines) are not available on the CI runner and report
      # `unresolvable_in_environment`, which --strict treats as advisory and never
      # blocks. Only genuine repo-relative drift/missing/invalid/unsupported anchors
      # fail this step. See scripts/check_evidence.py for the exit contract.
      - name: Evidence health (advisory for non-resolvable paths)
        run: python3 scripts/check_evidence.py --strict
