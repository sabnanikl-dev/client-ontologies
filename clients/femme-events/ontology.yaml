schema_version: "0.1"
kind: ontology
id: femme-events.ontology
client_id: femme-events
status: active
modules:
  - path: modules/brand.yaml
    id: femme-events.brand
  - path: modules/website.yaml
    id: femme-events.website
  - path: modules/local-visibility.yaml
    id: femme-events.local-visibility
  - path: modules/operations.yaml
    id: femme-events.operations
projections:
  - path: projections/agent-context.yaml
    id: femme-events.agent-context
  - path: projections/website-build.yaml
    id: femme-events.website-build
  - path: projections/local-seo.yaml
    id: femme-events.local-seo
handoff_outputs:
  - id: femme-events.agent-context
    target: generic_agent
notes: >
  Manifest and stable entry point for the Femme Events ontology. Agents and
  scripts should load this file first to discover canonical modules and the
  curated projections, rather than scanning the client folder. client.yaml
  holds client metadata, source registry, and privacy posture; this manifest
  governs module/projection membership.
