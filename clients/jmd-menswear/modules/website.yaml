rules:
  - id: jmd-menswear.website.showroom-not-ecommerce
    title: "Website is a showroom, not e-commerce"
    status: active
    severity: blocking
    rule_type: prohibited_claim
    statement: "JMD website content must frame inventory as showroom highlights, not live e-commerce inventory, checkout, cart, quantities, or guaranteed availability."
    source_confidence: verified
    machine_check:
      type: disallowed_terms
      disallowed_terms: ["add to cart", "buy online", "in stock", "only 1 left", "available now", "checkout"]
    evidence:
      - source_id: jmd-client-note
        lines: "51-54"
      - source_id: jmd-inventory-plan
        lines: "20-27,233-237"
  - id: jmd-menswear.website.no-live-changes-without-approval
    title: "No deploy/DNS/hosting changes without approval"
    status: active
    severity: approval_required
    rule_type: approval_required
    statement: "Do not deploy, touch DNS/HostGator/GoDaddy/Vercel, or change public hosting without explicit Karan approval."
    source_confidence: verified
    evidence:
      - source_id: jmd-harness-readme
        lines: "17-24"
